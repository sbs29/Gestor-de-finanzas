spring.application.name=finanzas-api

spring.datasource.url=jdbc:postgresql://localhost:5433/finanzas_db
spring.datasource.username=sbs
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.profiles.active=local,dev

security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS}

spring.jpa.open-in-view=false

server.port=8080